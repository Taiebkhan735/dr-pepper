<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Perks &amp; Newsletter | Dr Pepper Concept</title>
    <meta name="description" content="Sign up for drops, discounts, and exclusive content — high-conversion landing with minimal fields." />
    <link rel="canonical" href="https://example.com/newsletter.html" />
    <meta property="og:title" content="Join the inner circle | Dr Pepper Concept" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/input.css" />
  </head>
  <body class="h-full" data-page="newsletter">
    <div id="site-header"></div>
    <main id="main-content">
      <section class="border-b border-black/5 bg-hero-mesh py-16 dark:border-white/10 md:py-24">
        <div class="container-narrow text-center">
          <p class="text-sm font-semibold uppercase tracking-widest text-brand-metallic-light">Newsletter / signup</p>
          <h1 class="section-title mt-4 text-white">Join the inner circle</h1>
          <p class="mx-auto mt-4 max-w-xl text-lg text-white/90">
            Discount codes (demo), wallpapers, and early access — one field, one goal: submit.
          </p>
        </div>
      </section>
      <section class="container-narrow -mt-10 max-w-lg pb-20">
        <form id="newsletter-form" class="card-elevated shadow-glow" novalidate>
          <label for="nl-email" class="text-sm font-medium text-brand-ink dark:text-brand-cream">Email only</label>
          <input
            id="nl-email"
            name="email"
            type="email"
            required
            autocomplete="email"
            placeholder="you@domain.com"
            class="mt-2 w-full rounded-xl border border-black/10 bg-white px-4 py-3 text-brand-ink focus:border-brand-metallic focus:outline-none focus:ring-2 focus:ring-brand-metallic dark:border-white/10 dark:bg-brand-ink dark:text-brand-cream"
          />
          <p class="mt-3 text-xs text-brand-muted">No spam. Unsubscribe anytime. Demo build — no data leaves your device.</p>
          <button type="submit" class="btn-primary mt-6 w-full">Get my perks</button>
          <p class="mt-3 hidden text-center text-sm font-medium text-green-700 dark:text-green-400" data-form-status role="status"></p>
        </form>
        <p class="mt-8 text-center text-sm text-brand-muted">
          Prefer retail? <a href="store-locator.html" class="font-semibold text-brand-crimson underline-offset-2 hover:underline">Store locator</a>
        </p>
      </section>
    </main>
    <div id="site-footer"></div>
    <script type="module" src="./src/js/main.js"></script>
  </body>
</html>
