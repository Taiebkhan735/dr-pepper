<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact &amp; Support | Dr Pepper Concept</title>
    <meta name="description" content="Reach support, partnerships, and press — accessible form with clear success states." />
    <link rel="canonical" href="https://example.com/contact.html" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/input.css" />
  </head>
  <body class="h-full" data-page="contact">
    <div id="site-header"></div>
    <main id="main-content" class="pb-20">
      <div class="container-narrow pt-10 md:max-w-3xl">
        <h1 class="section-title">Contact &amp; support</h1>
        <p class="mt-4 text-brand-muted">Demo form — no backend. Labels exposed for screen readers; errors would ship with live validation.</p>
        <form id="contact-form" class="card-elevated mt-10" novalidate>
          <div class="grid gap-6 md:grid-cols-2">
            <div>
              <label for="c-name" class="text-sm font-medium">Name</label>
              <input
                id="c-name"
                name="name"
                type="text"
                autocomplete="name"
                class="mt-2 w-full rounded-xl border border-black/10 px-4 py-3 dark:border-white/10 dark:bg-brand-ink"
              />
            </div>
            <div>
              <label for="c-email" class="text-sm font-medium">Email</label>
              <input
                id="c-email"
                name="email"
                type="email"
                required
                autocomplete="email"
                class="mt-2 w-full rounded-xl border border-black/10 px-4 py-3 dark:border-white/10 dark:bg-brand-ink"
              />
            </div>
          </div>
          <div class="mt-6">
            <label for="c-topic" class="text-sm font-medium">Topic</label>
            <select
              id="c-topic"
              name="topic"
              class="mt-2 w-full rounded-xl border border-black/10 px-4 py-3 dark:border-white/10 dark:bg-brand-ink"
            >
              <option>Product question</option>
              <option>Retail / distribution</option>
              <option>Press</option>
              <option>Other</option>
            </select>
          </div>
          <div class="mt-6">
            <label for="c-msg" class="text-sm font-medium">Message</label>
            <textarea
              id="c-msg"
              name="message"
              rows="5"
              class="mt-2 w-full rounded-xl border border-black/10 px-4 py-3 dark:border-white/10 dark:bg-brand-ink"
            ></textarea>
          </div>
          <button type="submit" class="btn-primary mt-6 w-full">Send (demo)</button>
          <p class="mt-3 hidden text-sm font-medium text-green-700 dark:text-green-400" id="contact-status" role="status"></p>
        </form>
      </div>
    </main>
    <div id="site-footer"></div>
    <script type="module" src="./src/js/main.js"></script>
    <script type="module">
      const form = document.getElementById('contact-form')
      const status = document.getElementById('contact-status')
      form?.addEventListener('submit', (e) => {
        e.preventDefault()
        if (status) {
          status.textContent = 'Message captured — demo only, not sent.'
          status.classList.remove('hidden')
        }
      })
    </script>
  </body>
</html>
